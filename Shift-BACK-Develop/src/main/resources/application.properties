spring.application.name=Shift

#database connection
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

## JPA
# Enable Hibernate statistics for performance monitoring
spring.jpa.properties.hibernate.generate_statistics=true
# Hibernate SQL 로그 레벨을 DEBUG로 설정
logging.level.org.hibernate.SQL=DEBUG
# Hibernate가 실행하는 SQL을 콘솔에 출력 - 이걸 켜야 SQL 로그가 실제로 출력됨
spring.jpa.show-sql=true
# 애플리케이션 실행 중 발생하는 모든 데이터베이스 쿼리를 콘솔에서 즉시 확인
spring.jpa.properties.hibernate.show_sql=true
# SQL을 보기 좋게 정렬해서 출력
spring.jpa.properties.hibernate.format_sql=true
# 특정 데이터베이스(DB) 방언(Dialect)을 명시
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# DB
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.jpa.hibernate.ddl-auto=validate

# JWT_SECRET from environment or default for local dev
jwt.secret=${JWT_SECRET}
jwt.algorithm=HS256
jwt.access-token-validity-ms=1800000
jwt.refresh-token-validity-ms=604800000

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGIN}

